      &cYou can't create farms in wilderness. &7You need to place it inside a land.

       [T]&7Claim land: &8/&3Lands claim &8[CLICK][H]&7Click here to claim at your current position.[/H][C]lands claim[/C][/T]
  chat-action:
    player: '&7Please enter the name of the target player.'
    role:
      name: '&7Please enter a name for the new role.'
      max: '&cYou can''t create more roles for this farm. &7You reached your limit
        of&b {max} &7roles. Permisssion: betterfarming.roles.NUMBER'
command:
