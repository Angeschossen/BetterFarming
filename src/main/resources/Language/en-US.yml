    confirmation: |
      &cPlease confirm this purchase. &7Buying these farm(s) will cost you&c ${costs}&7.

      [T]&7Confirm: &8[&7CLICK&8][H]&7Click here to confirm this purchase.[/H][C]betterfarming get confirm[/C][/T]
    dropped: '&7You received a farm item for&b ${cost}&7. &cIt dropped to the ground,
      because there was no space left in your inventory.'
    success: '&7You received a farm item for&b ${cost}&7. It''s now in your inventory.'
  give:
    success-sender: '&7You successfully gave&b {items} &7farm item(s) to player&b {player}&7.'
    success-target: '&7You received&b {items} &7farm item(s). They were put in your
      inventory.'
    dropped: '&7You received&b {items} &7farm items. &cThey dropped to the ground,
      because there was no space left in your inventory.'
  help:
    header: '[NoPrefix]&7----------<- &2BetterFarming Help &7Page&3 {page} &8/&3 {pages} &7->----------'
    footer: '[NoPrefix]&7----------<- &2BetterFarming Help &7Page&3 {page} &8/&3 {pages} &7->----------'
    help: '&7Use &8/&a{cmd} help &7for help.'
    no-page: '&cThe page&4 {page} &cdoesn''t exist. &7Typo?'
    cmd-not-exist: '&cThis subcommand doesn''t exist. &7Command&3 {command} &7wasn''t found.'
