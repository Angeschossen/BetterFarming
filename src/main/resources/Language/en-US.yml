    no-permission: '&cYou don''t have permission to do this. &7You need permission&b
      {permission}&7.'
    cmd-not-exist: '&cThis subcommand doesn''t exist. &7Command&b {command} &7wasn''t
      found.'
    cant-afford: '&cYou can''t afford this. &7You need&b ${cost} &7money to pay this.'
    player-offline: '&cCouldn''t find this player. &7Player&b {player} &7is offline.'
    invalid-number: '&cYou entered an invalid number at the&e {argument} &cargument.
      &7Please insert a valid number there.'
