    help: '[T]&8/&3Farm help &8[&3page&8] - &7Get help[H]&7Click to copy.[/H][SC]farm help[/SC][/T]'
    get: '[T]&8/&3Farm get &8- &7Get farm item[H]&7Click to copy.[/H][SC]farm get[/SC][/T]'
    give: '[T]&8/&3Farm give &8<&3player&8> [&3amount&8] [&3radius-blocks&8] [&3growth-interval&8] [&3storage-slots&8] - &7Give farm item[H]&7Click to copy.[/H][SC]farm give[/SC][/T]'

